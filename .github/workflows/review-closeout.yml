name: Review closeout sweep

on:
  schedule:
    - cron: "17 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: review-closeout
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Create follow-up issues for current unresolved threads
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/review_closeout.py --repo "$GITHUB_REPOSITORY" --min-merged-with-threads 10
