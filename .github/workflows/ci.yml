name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Evaluate pinned environments
        run: nix flake check --no-build --all-systems

      - name: Synchronize frozen Python environment
        run: nix develop --command uv sync --frozen

      - name: Run tests
        run: nix develop --command uv run --frozen pytest

      - name: Smoke all benchmark lanes
        run: |
          # shellcheck disable=SC2016
          nix develop --command bash -euo pipefail -c '
            tmp_dir=$(mktemp -d)
            trap "rm -rf \"$tmp_dir\"" EXIT

            profiles=(fair claims prompt)
            pids=()

            # Each profile creates an independent run directory, so the smoke lanes can overlap.
            run_smoke() {
              local profile="$1"
              local log="$2"
              {
                result=$(.venv/bin/format-bench run \
                  --profile "$profile" \
                  --dataset github-stars-2026-07-03 \
                  --fixture)
                run_dir=$(dirname "$result")
                report=$(.venv/bin/format-bench report --run-dir "$run_dir")
                before=$(sha256sum "$report")
                .venv/bin/format-bench report --run-dir "$run_dir" >/dev/null
                after=$(sha256sum "$report")
                test "$before" = "$after"
                .venv/bin/python -c \
                  "import json,sys; m=json.load(open(sys.argv[1])); assert m.get(\"fixture\") and not m.get(\"rankable\")" \
                  "$run_dir/manifest.json"
              } >"$log" 2>&1
            }

            for profile in "${profiles[@]}"; do
              run_smoke "$profile" "$tmp_dir/$profile.log" &
              pids+=("$!")
            done

            failed=0
            for i in "${!profiles[@]}"; do
              if wait "${pids[$i]}"; then
                echo "${profiles[$i]} smoke passed"
              else
                status=$?
                echo "::group::${profiles[$i]} smoke failed"
                cat "$tmp_dir/${profiles[$i]}.log"
                echo "::endgroup::"
                echo "${profiles[$i]} smoke exited with status $status"
                failed=1
              fi
            done
            exit "$failed"
          '
